plugins {
    id 'java-library'
    // Single-project build, so the NeoGradle plugin is applied here with its version
    // (in the monorepo this version was declared once in the root build.gradle).
    id 'net.neoforged.gradle.userdev' version '7.1.38'
    id 'maven-publish'
}

// This mod's identity. Shared versions (Minecraft/NeoForge) come from gradle.properties.
ext {
    mod_id = 'redstonelapismod'
    mod_name = 'Redstone & Lapis Mod'
    mod_version = '0.3.1'
    mod_group_id = 'com.example.redstonelapismod'
}

version = mod_version
group = mod_group_id

base {
    archivesName = mod_id
}

// Mojang ships Java 21 to end users in 1.21.1, so mods should target Java 21.
java.toolchain.languageVersion = JavaLanguageVersion.of(21)

sourceSets.main.resources {
    // Include resources generated by data generators.
    srcDir('src/generated/resources')

    // Exclude common development only resources from finalized outputs
    exclude("**/*.bbmodel") // BlockBench project files
    exclude("src/generated/**/.cache") // datagen cache files
}

// Default run configurations. Launch with e.g. `./gradlew runClient`.
runs {
    configureEach {
        systemProperty 'forge.logging.markers', 'REGISTRIES'
        systemProperty 'forge.logging.console.level', 'debug'
        workingDirectory project.layout.projectDirectory.dir('run').dir(name)
        modSource project.sourceSets.main
    }

    client {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
    }

    server {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        argument '--nogui'
    }

    gameTestServer {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
    }

    data {
        arguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
    }
}

// 'localRuntime' — runtime-only test dependencies that are not published to dependents.
configurations {
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    implementation "net.neoforged:neoforge:${neo_version}"
}

// Expand ${...} placeholders in neoforge.mods.toml using this project's properties.
tasks.withType(ProcessResources).configureEach {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
    ]
    inputs.properties replaceProperties

    filesMatching(['META-INF/neoforge.mods.toml']) {
        expand replaceProperties
    }
}

// Publish this mod to a local maven repo under the project directory.
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

// --- Dev convenience: copy the freshly built jar into a Prism Launcher instance ---
// The mods-folder path is machine-specific, so it is NOT hardcoded here (this file is
// committed to a public repo). Set it in your GLOBAL, never-committed Gradle config
// (~/.gradle/gradle.properties):
//   prismModsDir=C:/Users/Ryan/AppData/Roaming/PrismLauncher/instances/1.21.1 Vanila ++/minecraft/mods
// Then run:  ./gradlew deployToPrism
tasks.register('deployToPrism', Copy) {
    group = 'deployment'
    description = 'Builds the mod jar and copies it into the Prism test instance mods folder.'

    def modsDir = project.findProperty('prismModsDir')

    // Skip cleanly (don't fail the build) if the path hasn't been configured on this machine.
    onlyIf {
        boolean configured = modsDir != null
        if (!configured) {
            logger.warn('deployToPrism: set prismModsDir in ~/.gradle/gradle.properties to enable this task.')
        }
        configured
    }

    from tasks.named('jar')                                       // depends on + takes the built mod jar
    into modsDir ?: layout.buildDirectory.dir('libs')            // fallback keeps config valid when unset

    // Remove older builds of THIS mod first so two versions can never load at once.
    // Plain java.io.File is used (not Gradle's fileTree/delete) to stay configuration-cache safe.
    doFirst {
        if (modsDir != null) {
            new File(modsDir.toString()).listFiles({ dir, name ->
                name.startsWith('redstonelapismod-') && name.endsWith('.jar')
            } as FilenameFilter)?.each { it.delete() }
        }
    }
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
